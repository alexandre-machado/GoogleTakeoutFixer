# Made with much help from AI
# Builds and releases binaries for Linux, Windows, and macOS (universal)
# Bundles ExifTool with each release
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: GoogleTakeoutFixer

jobs:

  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libwayland-dev libxkbcommon-dev

      - name: Build & Bundle
        run: |
          set -euo pipefail
          OUT="${APP_NAME}_Linux_x64"
          mkdir -p "${OUT}"

          CGO_ENABLED=1 go build -ldflags "-s -w" -o "${OUT}/${APP_NAME}" ./cmd/main.go

          ET_VERSION="$(curl -fsSL --retry 3 https://exiftool.org/ver.txt | tr -d '[:space:]')"
          curl -fsSL --retry 3 -o et.tgz "https://exiftool.org/Image-ExifTool-${ET_VERSION}.tar.gz"
          tar xf et.tgz
          cp "Image-ExifTool-${ET_VERSION}/exiftool" "${OUT}/"
          cp -r "Image-ExifTool-${ET_VERSION}/lib" "${OUT}/"
          chmod +x "${OUT}/exiftool"

          cp LICENSE "${OUT}/LICENSE.txt"
          [ -f README.md ] && cp README.md "${OUT}/README.md"

          printf '#!/usr/bin/env bash\ncd "$(dirname "$0")"\nexec ./%s "$@"\n' "${APP_NAME}" > "${OUT}/run.sh"
          chmod +x "${OUT}/run.sh"

          tar czf "${OUT}.tar.gz" "${OUT}"

      - uses: actions/upload-artifact@v4
        with:
          name: asset-linux
          path: ${{ env.APP_NAME }}_Linux_x64.tar.gz


  build-windows:
    name: Build Windows x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64 zip

      - name: Build & Bundle
        run: |
          set -euo pipefail
          OUT="${APP_NAME}_Windows_x64"
          mkdir -p "${OUT}"

          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc \
            go build -ldflags "-s -w -H=windowsgui" -o "${OUT}/${APP_NAME}.exe" ./cmd/main.go

          ET_VERSION="$(curl -fsSL --retry 3 https://exiftool.org/ver.txt | tr -d '[:space:]')"
          curl -fsSL --retry 3 -o et.zip "https://exiftool.org/exiftool-${ET_VERSION}_64.zip"
          unzip -q et.zip
          mv "$(find . -maxdepth 3 -name 'exiftool(-k).exe' | head -1)" "${OUT}/exiftool.exe"
          find . -maxdepth 3 -type d -name 'exiftool_files' -exec cp -r {} "${OUT}/" \; 2>/dev/null || true

          cp LICENSE "${OUT}/LICENSE.txt"
          [ -f README.md ] && cp README.md "${OUT}/README.md"

          zip -r "${OUT}.zip" "${OUT}"

      - uses: actions/upload-artifact@v4
        with:
          name: asset-windows
          path: ${{ env.APP_NAME }}_Windows_x64.zip


  build-macos:
    name: Build macOS Universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build & Bundle
        run: |
          set -euo pipefail
          OUT="${APP_NAME}_macOS_universal"
          mkdir -p "${OUT}"

          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -ldflags "-s -w" -o bin_arm64 ./cmd/main.go
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            CGO_CFLAGS="-arch x86_64" CGO_LDFLAGS="-arch x86_64" \
            go build -ldflags "-s -w" -o bin_amd64 ./cmd/main.go
          lipo -create -output "${OUT}/${APP_NAME}" bin_arm64 bin_amd64
          chmod +x "${OUT}/${APP_NAME}"

          ET_VERSION="$(curl -fsSL --retry 3 https://exiftool.org/ver.txt | tr -d '[:space:]')"
          curl -fsSL --retry 3 -o et.tgz "https://exiftool.org/Image-ExifTool-${ET_VERSION}.tar.gz"
          tar xf et.tgz
          cp "Image-ExifTool-${ET_VERSION}/exiftool" "${OUT}/"
          cp -r "Image-ExifTool-${ET_VERSION}/lib" "${OUT}/"
          chmod +x "${OUT}/exiftool"

          cp LICENSE "${OUT}/LICENSE.txt"
          [ -f README.md ] && cp README.md "${OUT}/README.md"

          tar czf "${OUT}.tar.gz" "${OUT}"

      - uses: actions/upload-artifact@v4
        with:
          name: asset-macos
          path: ${{ env.APP_NAME }}_macOS_universal.tar.gz


  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: asset-*
          path: .
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
          draft: true
          generate_release_notes: true